services:
  # 1. Локальная LLM (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: devops_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - devops_net

  # 2. Backend с агентами CrewAI
  crewai_backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devops_crew  
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=llama3.2
      - OPENAI_API_KEY=sk-no-key-required
      - OPENAI_API_BASE=http://ollama:11434/v1
      - LOG_LEVEL=INFO
      - LOGS_DIR=/app/logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    ports:
      - "8800:8800"
    restart: unless-stopped
    command: uvicorn app:app --host 0.0.0.0 --port 8800
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - devops_net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # 3. Веб-интерфейс (Streamlit)
  web_ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: devops_ui
    depends_on:
      crewai_backend:
        condition: service_started
    environment:
      - BACKEND_URL=http://crewai_backend:8800
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs:ro
    restart: unless-stopped
    command: streamlit run web_ui.py --server.address=0.0.0.0 --server.enableCORS=false
    networks:
      - devops_net

  # 4. Фоновый наблюдатель (Watcher) 
  watcher:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devops_watcher
    depends_on:
      crewai_backend:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=mistral
      - OPENAI_API_KEY=sk-no-key-required
      - OPENAI_API_BASE=http://ollama:11434/v1
      - WATCHER_INTERVAL=60   
      - LOGS_DIR=/app/logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -u watcher.py
    networks:
      - devops_net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  devops_net:
    driver: bridge

volumes:
  ollama_data:
    driver: local
